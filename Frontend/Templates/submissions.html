<html>

<head>
    <meta charset="UTF-8">
    <title>Submissions</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: monospace;
            background: #f5f5f5;
            color: #111;
            padding: 30px 20px;
        }

        h2 {
            text-align: center;
            font-size: 16px;
            margin-bottom: 24px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        ul {
            list-style: none;
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        li a {
            display: block;
            padding: 8px 12px;
            background: #fff;
            border: 1px solid #bbb;
            color: #111;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.3px;
        }

        li a:hover {
            background: #e4e4e4;
        }
    </style>
</head>

<body>

    <h2>SUBMISSÕES</h2>

    <ul>
        {% for sub in submissions %}
        <li>
            <a href="/submission/{{ sub.id }}">
                ID: {{ sub.id }} &nbsp;//&nbsp; TIME: {{ sub.date }} &nbsp;//&nbsp; LANGUAGE: {{ sub.language }}
            </a>
        </li>
        {% endfor %}
    </ul>

</body>

</html>
